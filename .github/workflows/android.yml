name: Android Build (assembleDebug)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'
    - name: Install required packages
      run: |
        sudo apt-get update
        sudo apt-get install -y unzip wget gradle android-tools-adb
    - name: Install Android commandline tools
      run: |
        mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
        cd $ANDROID_SDK_ROOT/cmdline-tools
        wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline.zip
        unzip cmdline.zip -d temp
        # place commandlinetools at $ANDROID_SDK_ROOT/cmdline-tools/latest
        mkdir -p $ANDROID_SDK_ROOT/cmdline-tools/latest
        mv temp/cmdline-tools/* $ANDROID_SDK_ROOT/cmdline-tools/latest/ || true
    - name: Debug: environment info
      run: |
        echo "PATH=$PATH"
        java -version || true
        which gradle || true
        which adb || true
        echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
        ls -la $ANDROID_SDK_ROOT || true
    - name: Install Android SDK packages
      run: |
        set -x
        $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT --list || true
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platform-tools" "platforms;android-33" "build-tools;33.0.2"
        # accept licenses
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses || true
    - name: Add platform-tools to PATH
      run: echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
    - name: Set ANDROID_HOME
      run: echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    - name: Debug: list project files and gradle config
      run: |
        echo "--- workspace ---"
        ls -la
        echo "--- app dir ---"
        ls -la app || true
        echo "--- gradle files ---"
        for f in build.gradle settings.gradle settings.gradle.kts gradle.properties gradlew gradle/wrapper/gradle-wrapper.jar; do
          echo "---- $f ----"
          if [ -f "$f" ]; then
            stat "$f" || true
            sed -n '1,200p' "$f" || true
          else
            echo "(missing) $f"
          fi
        done
    - name: Build assembleDebug
      run: |
        set -x
        # prefer project wrapper if usable, otherwise fall back to system gradle
        if [ -x ./gradlew ]; then
          echo "Using ./gradlew"
          ./gradlew assembleDebug --no-daemon || true
        else
          echo "No gradlew executable, using system gradle"
        fi
        if [ ! -f app/build/outputs/apk/debug/app-debug.apk ]; then
          echo "Running system gradle"
          gradle assembleDebug --no-daemon
        fi
        echo "build exit status: $?"
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
